<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国抗菌药物临床应用监测网 DDD 值 (2025版)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header .update-date {
            color: #666;
            font-size: 14px;
        }
        
        .search-box {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
        }
        
        .stat-item span {
            color: #667eea;
            font-weight: 600;
        }
        
        .table-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        .route {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .route.O {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .route.P {
            background: #fce4ec;
            color: #c2185b;
        }
        
        .ddd-value {
            font-weight: 600;
            color: #333;
        }
        
        .note {
            color: #999;
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px;
        }
        
        .pagination button {
            padding: 10px 20px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .pagination button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .pagination span {
            color: #666;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💊 全国抗菌药物临床应用监测网 DDD 值</h1>
            <p class="update-date">更新日期：2025年06月30日</p>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 搜索药品名称、通用名..." oninput="filterData()">
            <div class="stats">
                <div class="stat-item">总药品数: <span id="totalCount">-</span></div>
                <div class="stat-item">口服(O): <span id="oralCount">-</span></div>
                <div class="stat-item">注射(P): <span id="injectCount">-</span></div>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>药品名称</th>
                        <th>通用名</th>
                        <th>用药途径</th>
                        <th>DDD (g)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="pagination" id="pagination">
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        const pageSize = 50;
        
        // 从 data.js 加载数据
        const rawData = typeof DRUG_DATA !== 'undefined' ? DRUG_DATA : [];
        console.log('Loaded', rawData.length, 'drugs');
        
        function init() {
            if (rawData.length === 0) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="no-results">数据加载失败，请刷新页面</td></tr>';
                return;
            }
            
            // 处理数据
            allData = rawData.map((item, index) => ({
                ...item,
                index: index + 1
            }));
            
            filteredData = [...allData];
            updateStats();
            renderTable();
        }
        
        function updateStats() {
            document.getElementById('totalCount').textContent = allData.length;
            document.getElementById('oralCount').textContent = allData.filter(d => d.route === 'O').length;
            document.getElementById('injectCount').textContent = allData.filter(d => d.route === 'P').length;
        }
        
        function filterData() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!keyword) {
                filteredData = [...allData];
            } else {
                filteredData = allData.filter(item => 
                    item.drug.toLowerCase().includes(keyword) || 
                    item.generic.toLowerCase().includes(keyword)
                );
            }
            
            currentPage = 1;
            renderTable();
        }
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);
            
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-results">没有找到匹配的药品</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = pageData.map(item => {
                const isNote = item.ddd.includes('*');
                const dddDisplay = item.ddd.replace('*', '') + (isNote ? ' <span class="note">*</span>' : '');
                return \`
                    <tr>
                        <td>\${item.index}</td>
                        <td>\${item.drug}</td>
                        <td>\${item.generic}</td>
                        <td><span class="route \${item.route}">\${item.route === 'O' ? '口服' : '注射'}</span></td>
                        <td class="ddd-value">\${dddDisplay}</td>
                    </tr>
                \`;
            }).join('');
            
            tbody.innerHTML = html;
            renderPagination();
        }
        
        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = \`
                <button \${currentPage === 1 ? 'disabled' : ''} onclick="goPage(1)">首页</button>
                <button \${currentPage === 1 ? 'disabled' : ''} onclick="goPage(\${currentPage - 1})">上一页</button>
                <span>第 \${currentPage} / \${totalPages} 页</span>
                <button \${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(\${currentPage + 1})">下一页</button>
                <button \${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(\${totalPages})">末页</button>
            \`;
            
            pagination.innerHTML = html;
        }
        
        function goPage(page) {
            currentPage = page;
            renderTable();
            // 滚动到顶部
            document.querySelector('.table-container').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
